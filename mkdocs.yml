site_name: The Anunnaki Archive
site_description: "A comprehensive digital library of Zecharia Sitchin's Earth Chronicles — the Anunnaki, Nibiru, and ancient astronaut theory"
site_url: https://anunnaki-archive.com

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - header.autohide
    - announce.dismiss

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@anunnakiarchive
    - icon: fontawesome/brands/github
      link: https://github.com/michalplacek/anunnaki-archive
    - icon: fontawesome/solid/envelope
      link: mailto:a32675117@gmail.com
  analytics:
    provider: google
    property: G-XXXXXXXXXX

copyright: "Copyright &copy; 2026 The Anunnaki Archive | Contact: a32675117@gmail.com"

plugins:
  - search
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/membership.js

